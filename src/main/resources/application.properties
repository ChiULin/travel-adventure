# Local MySQL database
spring.datasource.url=jdbc:mysql://localhost:3306/travel_adventure?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Taipei&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Existing MySQL installations are baselined at version 1; all later schema changes use Flyway.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.clean-disabled=true

# MySQL already contains the application data
spring.sql.init.mode=never
spring.sql.init.encoding=UTF-8

# Server
server.port=8080
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000
spring.application.name=demo

# In-memory challenge state (single-node only; use Redis or a database before multi-node deployment)
game.quiz.max-pending-per-player=5
game.quiz.cleanup-interval-ms=60000
game.exploration.cleanup-interval-ms=60000
game.image-recognition.cleanup-interval-ms=60000
game.boss.cleanup-interval-ms=60000
