<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>台灣旅行冒險：一邊玩遊戲，一邊認識台灣歷史與文化</title>
  <style>
    :root {
      --bg: #eef5ff;
      --panel: #ffffff;
      --ink: #111827;
      --text: #2f3a4f;
      --muted: #657188;
      --line: #d8e5fb;
      --blue: #246fe5;
      --green: #28a85a;
      --gold: #f3b43f;
      --red: #d9434e;
      --shadow: 0 14px 34px rgba(31, 70, 130, .12);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif;
      background:
        radial-gradient(circle at 8% 8%, rgba(36, 112, 232, .13), transparent 28%),
        radial-gradient(circle at 90% 0%, rgba(40, 180, 92, .13), transparent 26%),
        var(--bg);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(115deg, transparent 0%, rgba(255,255,255,.22) 18%, transparent 36%),
        repeating-linear-gradient(0deg, rgba(18, 59, 120, .035) 0 1px, transparent 1px 5px);
      background-size: 260px 100%, auto;
      opacity: .42;
      animation: ambientSweep 8s linear infinite;
    }

    button, input { font: inherit; }
    button { border: 0; cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .58; }
    h1, h2, h3, p { margin-top: 0; }

    .app {
      width: min(100%, 1180px);
      margin: 0 auto;
      padding: 18px;
    }

    .topbar, .summary-card, .progress-card, .city-card, .detail-card, .login-card {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .92);
      box-shadow: var(--shadow);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px;
      border-radius: 8px;
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }

    .topbar::after {
      content: "";
      position: absolute;
      inset: auto 0 0;
      height: 3px;
      background: linear-gradient(90deg, var(--blue), var(--green), var(--gold), var(--blue));
      background-size: 220% 100%;
      animation: routeGlow 5s ease-in-out infinite;
      z-index: 0;
    }

    .topbar > * {
      position: relative;
      z-index: 1;
    }

    .brand {
      display: grid;
      grid-template-columns: 52px 1fr;
      gap: 12px;
      align-items: center;
    }

    .brand-mark {
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: white;
      background: linear-gradient(145deg, #2b8cff, #2aae6b 62%, #f0c447);
      font-weight: 900;
      box-shadow: 0 0 0 0 rgba(36, 111, 229, .32);
      animation: badgePulse 2.8s ease-in-out infinite;
    }

    .brand h1 {
      margin-bottom: 4px;
      color: var(--ink);
      font-size: 28px;
      line-height: 1.2;
    }
    .brand p { margin-bottom: 0; color: var(--muted); font-weight: 700; }

    .btn {
      min-height: 40px;
      padding: 9px 13px;
      border-radius: 8px;
      color: white;
      background: linear-gradient(180deg, #34ca69, #21994a);
      font-weight: 900;
    }

    .btn.red { background: linear-gradient(180deg, #ff5964, #cf2630); }
    .btn.ghost { color: #123b78; border: 1px solid #bfd3f6; background: white; }
    .btn.full { width: 100%; margin-top: 10px; }

    .home-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 14px;
      align-items: start;
      margin-top: 14px;
    }

    .main-stack, .side-stack { display: grid; gap: 14px; }

    .summary-card, .progress-card, .detail-card {
      border-radius: 8px;
      padding: 16px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .section-head h2 {
      margin-bottom: 0;
      color: var(--ink);
      font-size: 20px;
    }

    .summary-layout {
      display: grid;
      grid-template-columns: 64px minmax(0, 1fr);
      gap: 14px;
      align-items: center;
    }

    .avatar {
      width: 64px;
      height: 64px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: white;
      background: linear-gradient(145deg, #164d9b, #0d2c68);
      font-size: 28px;
      font-weight: 900;
    }

    .player-name {
      margin-bottom: 4px;
      color: var(--ink);
      font-size: 24px;
      font-weight: 900;
    }

    .player-title { color: var(--muted); font-weight: 800; }

    .player-level {
      margin-top: 14px;
    }

    .level-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      color: var(--ink);
      font-weight: 900;
    }

    .exp-bar {
      width: 100%;
      height: 14px;
      background: #dfe6e9;
      border-radius: 10px;
      overflow: hidden;
    }

    #exp-bar-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #38b000, #70e000);
      transition: width 0.5s ease;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .metric {
      min-height: 72px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f7faff;
    }

    .metric strong {
      display: block;
      color: var(--ink);
      font-size: 22px;
      line-height: 1.2;
    }

    .metric span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .progress {
      height: 12px;
      border-radius: 999px;
      background: #dfe9fb;
      overflow: hidden;
    }

    .progress span {
      display: block;
      width: var(--w, 0%);
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--green));
      background-size: 180% 100%;
      animation: progressShine 2.6s ease-in-out infinite;
    }

    .journey-line {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-weight: 800;
    }

    .city-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .city-card {
      min-height: 198px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 14px;
      border-radius: 8px;
      text-align: left;
      color: var(--text);
      background: white;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }

    .city-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 38px rgba(31, 70, 130, .18);
    }
    .city-card.active { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(36, 111, 229, .13), var(--shadow); }
    .city-card.locked { background: #f4f7fb; color: #667085; }
    .city-card.completed { border-color: rgba(40, 168, 90, .48); }
    .city-card.challenge { border-color: rgba(243, 180, 63, .75); }

    .city-title {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--ink);
      font-size: 19px;
      font-weight: 900;
    }

    .city-icon {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: rgba(36, 111, 229, .11);
      font-size: 20px;
    }

    .city-card.locked .city-icon { background: #e6ebf3; }
    .city-copy { margin-bottom: 0; color: inherit; font-size: 14px; line-height: 1.45; font-weight: 800; }
    .city-badge-line { color: #74510d; font-weight: 900; }
    .status-pill {
      width: fit-content;
      margin-top: auto;
      padding: 5px 8px;
      border-radius: 999px;
      color: #123b78;
      background: #e9f1ff;
      font-size: 13px;
      font-weight: 900;
    }

    .status-pill.locked { color: #5f6673; background: #e7ebf2; }
    .status-pill.challenge { color: #724b00; background: #fff1cb; }
    .status-pill.completed { color: #126236; background: #def8e8; }

    .detail-card {
      position: sticky;
      top: 14px;
    }

    .detail-hero {
      min-height: 126px;
      display: grid;
      align-content: end;
      margin: -16px -16px 14px;
      padding: 16px;
      color: white;
      background:
        linear-gradient(180deg, rgba(11, 35, 71, .08), rgba(11, 35, 71, .68)),
        linear-gradient(135deg, #4f9eff, #38af73);
    }

    .detail-hero h2 { margin-bottom: 4px; color: white; }
    .detail-hero p { margin-bottom: 0; line-height: 1.45; font-weight: 800; }

    .scene-list {
      display: grid;
      gap: 10px;
    }

    .scene-card {
      display: grid;
      grid-template-columns: 84px minmax(0, 1fr);
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
    }

    .scene-card.done { border-color: rgba(40, 168, 90, .42); background: #f5fff8; }
    .scene-card.locked { background: #f5f7fa; }

    .scene-image {
      width: 84px;
      aspect-ratio: 1;
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.22), rgba(11,35,71,.18)),
        linear-gradient(135deg, #59baff, #4db56a);
      background-position: center;
      background-size: cover;
    }

    .scene-card h3 { margin-bottom: 3px; color: var(--ink); font-size: 16px; }
    .scene-card p { margin-bottom: 8px; color: var(--muted); font-size: 13px; line-height: 1.4; font-weight: 700; }
    .story-text {
      white-space: pre-line;
    }
    .reward-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 900;
    }

    .quiz-box {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .quiz-box strong {
      color: var(--ink);
      font-size: 13px;
    }

    .quiz-options {
      display: grid;
      gap: 6px;
    }

    .quiz-option {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: #123b78;
      background: #f7faff;
      text-align: left;
      font-size: 13px;
      font-weight: 900;
    }

    .quiz-option:hover {
      border-color: var(--blue);
      background: #edf4ff;
      transform: translateX(2px);
    }

    .detail-actions {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .log-list { display: grid; gap: 8px; margin-top: 14px; }
    .log {
      padding: 10px;
      border-radius: 8px;
      background: #f7faff;
      font-size: 13px;
      line-height: 1.45;
    }

    .login {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(14, 31, 68, .58);
      backdrop-filter: blur(10px);
    }

    .login.hidden { display: none; }
    .login-card {
      width: min(100%, 420px);
      padding: 22px;
      border-radius: 8px;
    }

    .login-card h2 { margin-bottom: 8px; color: var(--ink); font-size: 28px; }
    .login-card p { color: var(--muted); line-height: 1.55; font-weight: 700; }
    .login-card input {
      width: 100%;
      height: 44px;
      margin-bottom: 10px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      outline: none;
    }

    .error {
      min-height: 20px;
      margin-bottom: 8px;
      color: var(--red);
      font-size: 13px;
      font-weight: 800;
    }

    @keyframes ambientSweep {
      from { background-position: -260px 0, 0 0; }
      to { background-position: 260px 0, 0 0; }
    }

    @keyframes routeGlow {
      0%, 100% { background-position: 0% 50%; opacity: .72; }
      50% { background-position: 100% 50%; opacity: 1; }
    }

    @keyframes badgePulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(36, 111, 229, .28); transform: translateY(0); }
      50% { box-shadow: 0 0 0 8px rgba(36, 111, 229, 0); transform: translateY(-1px); }
    }

    @keyframes progressShine {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @media (max-width: 980px) {
      .home-grid { grid-template-columns: 1fr; }
      .detail-card { position: static; }
      .city-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 640px) {
      .app { padding: 12px; }
      .topbar, .section-head { align-items: stretch; flex-direction: column; }
      .brand { grid-template-columns: 44px 1fr; }
      .brand-mark { width: 44px; height: 44px; }
      .brand h1 { font-size: 22px; }
      .metric-grid, .city-grid { grid-template-columns: 1fr; }
      .summary-layout { grid-template-columns: 52px 1fr; }
      .avatar { width: 52px; height: 52px; font-size: 23px; }
      .scene-card { grid-template-columns: 72px minmax(0, 1fr); }
      .scene-image { width: 72px; }
    }
  </style>
</head>
<body>
  <div id="login" class="login">
    <form class="login-card" id="loginForm">
      <h2>台灣旅行冒險</h2>
      <p>一邊玩遊戲，一邊認識台灣歷史與文化。</p>
      <input id="nameInput" minlength="3" maxlength="20" autocomplete="username" placeholder="玩家名稱" value="旅行者" />
      <input id="passwordInput" type="password" minlength="8" maxlength="72" autocomplete="current-password" placeholder="密碼（至少 8 個字元）" />
      <div class="error" id="loginError"></div>
      <button class="btn full" type="submit">登入</button>
      <button class="btn ghost full" id="registerBtn" type="button">建立帳號</button>
    </form>
  </div>

  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">TA</div>
        <div>
          <h1>台灣旅行冒險：一邊玩遊戲，一邊認識台灣歷史與文化</h1>
          <p>探索城市、完成景點、挑戰守護者、收集徽章。</p>
        </div>
      </div>
      <button class="btn ghost" type="button" id="logoutBtn">登出</button>
    </header>

    <div class="home-grid">
      <div class="main-stack">
        <section id="player-summary"></section>
        <section id="journey-progress"></section>
        <section id="city-list"></section>
      </div>
      <section id="city-detail"></section>
    </div>
  </main>

  <script>
    const SESSION_KEY = "travelAdventureApiSession";
    let session = loadSession();
    let appState = null;
    let activeCityId = null;
    let logs = [];

    function loadSession() {
      try {
        return JSON.parse(localStorage.getItem(SESSION_KEY) || "null");
      } catch {
        return null;
      }
    }

    function saveSession(nextSession) {
      session = nextSession;
      if (nextSession) {
        localStorage.setItem(SESSION_KEY, JSON.stringify(nextSession));
      } else {
        localStorage.removeItem(SESSION_KEY);
      }
    }

    async function api(path, options = {}) {
      const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
      if (session?.token) headers.Authorization = `Bearer ${session.token}`;
      const response = await fetch(path, { ...options, headers });
      if (!response.ok) {
        const text = await response.text();
        let message = text;
        try {
          const errorBody = JSON.parse(text);
          message = errorBody.message || errorBody.error || "";
        } catch {
          // Plain-text API errors are already suitable for display.
        }
        throw new Error(message || `操作失敗（${response.status}）`);
      }
      return response.json();
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function validateAuthInput(username, password) {
      if (!username) return "請輸入玩家名稱";
      if (username.length < 3 || username.length > 20) return "玩家名稱需為 3 到 20 個字元";
      if (!password) return "請輸入密碼";
      if (password.length < 8 || password.length > 72) return "密碼需為 8 到 72 個字元";
      return "";
    }

    function formatNumber(value) {
      return Number(value || 0).toLocaleString("zh-TW");
    }

    function progress(city) {
      const total = city?.total || 0;
      const done = city?.done || 0;
      return { done, total, percent: total ? Math.round(done / total * 100) : 0 };
    }

    function cityStatus(city) {
      const itemProgress = progress(city);
      if (!city.unlocked) return { key: "locked", text: "尚未解鎖", note: "完成上一座城市後解鎖" };
      if (city.defeated) return { key: "completed", text: "已完成", note: "城市徽章已取得" };
      if (city.bossUnlocked || (itemProgress.total > 0 && itemProgress.done >= itemProgress.total)) {
        return { key: "challenge", text: "可挑戰", note: `可以挑戰 ${city.bossName}` };
      }
      return { key: "active", text: "探索中", note: `還有 ${itemProgress.total - itemProgress.done} 個景點` };
    }

    function activeCity() {
      return appState?.cities.find(city => city.id === activeCityId) || appState?.cities[0];
    }

    function addLog(text) {
      const time = new Date().toLocaleTimeString("zh-TW", { hour: "2-digit", minute: "2-digit" });
      logs.unshift({ time, text });
      logs = logs.slice(0, 4);
      renderCityDetail(activeCityId);
    }

    function renderOptionButtons(options, dataAttribute, targetId) {
      if (!options) return "";
      return Object.entries(options)
        .filter(([, value]) => value)
        .map(([key, value]) => `
          <button class="quiz-option" type="button" ${dataAttribute}="${targetId}" data-answer="${key}" data-answer-text="${escapeHtml(value)}">
            ${key}. ${escapeHtml(value)}
          </button>
        `).join("");
    }

    async function authenticate(path, username, password) {
      const auth = await api(path, {
        method: "POST",
        body: JSON.stringify({ username, password })
      });
      saveSession(auth);
      document.getElementById("login").classList.add("hidden");
      await refreshState();
      return auth;
    }

    async function login(username, password) {
      const auth = await authenticate("/api/auth/login", username, password);
      addLog(`${auth.username} 已登入。`);
    }

    async function register(username, password) {
      const auth = await authenticate("/api/auth/register", username, password);
      addLog(`${auth.username} 的帳號已建立。`);
    }

    async function refreshState() {
      if (!session?.token) return;
      appState = await api("/api/journey/me");
      if (!activeCityId) {
        const firstUnlocked = appState.cities.find(city => city.unlocked) || appState.cities[0];
        activeCityId = firstUnlocked.id;
      }
      renderAll();
    }

    function renderPlayerSummary() {
      const user = appState.user;
      const currentExp = user.currentLevelExp ?? 0;
      const nextExp = user.nextLevelExp ?? 100;
      const badgeCount = appState.cities.filter(city => city.badgeUnlocked).length;
      const unlocked = appState.cities.filter(city => city.unlocked).length;
      const avatar = (user.username || "T").trim().slice(0, 1).toUpperCase();

      document.getElementById("player-summary").innerHTML = `
        <div class="summary-card">
          <div class="summary-layout">
            <div class="avatar">${escapeHtml(avatar)}</div>
            <div>
              <div class="player-name">玩家：${escapeHtml(user.username)}</div>
              <div class="player-title">等級：Lv.${user.level || 1} ${escapeHtml(user.title || "新手旅行者")}</div>
            </div>
          </div>
          <div class="player-level">
            <div class="level-header">
              <span id="player-level">Lv.1</span>
              <span id="player-exp-text">0 / 100 EXP</span>
            </div>
            <div class="exp-bar">
              <div id="exp-bar-fill"></div>
            </div>
          </div>
          <div class="metric-grid">
            <div class="metric"><strong>${currentExp} / ${nextExp}</strong><span>經驗值</span></div>
            <div class="metric"><strong>${formatNumber(user.coins)}</strong><span>金幣</span></div>
            <div class="metric"><strong>${badgeCount}</strong><span>已取得徽章</span></div>
            <div class="metric"><strong>${unlocked} / ${appState.cities.length}</strong><span>城市總進度</span></div>
          </div>
        </div>
      `;
      renderPlayerLevel(user);
    }

    function renderPlayerLevel(data) {
      document.getElementById("player-level").textContent = `Lv.${data.level || 1}`;
      document.getElementById("player-exp-text").textContent =
        `${data.currentLevelExp ?? 0} / ${data.nextLevelExp ?? 100} EXP`;
      document.getElementById("exp-bar-fill").style.width =
        `${data.levelProgressPercent ?? 0}%`;
    }

    function renderJourneyProgress() {
      const totalScenes = appState.cities.reduce((sum, city) => sum + (city.total || 0), 0);
      const doneScenes = appState.cities.reduce((sum, city) => sum + (city.done || 0), 0);
      const completedCities = appState.cities.filter(city => city.defeated).length;
      const percent = totalScenes ? Math.round(doneScenes / totalScenes * 100) : 0;

      document.getElementById("journey-progress").innerHTML = `
        <div class="progress-card">
          <div class="section-head">
            <h2>旅程總覽</h2>
            <strong>${completedCities} / ${appState.cities.length} 城市完成</strong>
          </div>
          <div class="journey-line">
            <span>景點完成率：${doneScenes} / ${totalScenes}</span>
            <div class="progress" aria-label="旅程進度"><span style="--w:${percent}%"></span></div>
          </div>
        </div>
      `;
    }

    function renderCityCards() {
      document.getElementById("city-list").innerHTML = `
        <div class="section-head">
          <h2>城市旅程</h2>
          <strong>點選城市查看景點</strong>
        </div>
        <div class="city-grid">
          ${appState.cities.map(city => {
            const itemProgress = progress(city);
            const status = cityStatus(city);
            const active = city.id === activeCityId;
            const icon = city.unlocked ? city.badgeIcon || "🎒" : "🔒";
            const progressMarkup = city.unlocked ? `
              <p class="city-copy">城市進度：${itemProgress.done} / ${itemProgress.total}</p>
              <div class="progress" aria-label="${escapeHtml(city.name)} 進度"><span style="--w:${itemProgress.percent}%"></span></div>
              <div class="city-badge-line">🏅 ${escapeHtml(city.badgeName || city.name + "徽章")}</div>
            ` : `
              <p class="city-copy">${status.note}</p>
            `;

            return `
              <button class="city-card ${status.key} ${active ? "active" : ""}" type="button" data-city-id="${city.id}">
                <div class="city-title"><span class="city-icon">${icon}</span>${escapeHtml(city.name)}</div>
                ${progressMarkup}
                <span class="status-pill ${status.key}">狀態：${status.text}</span>
              </button>
            `;
          }).join("")}
        </div>
      `;

      document.querySelectorAll("[data-city-id]").forEach(button => {
        button.addEventListener("click", () => {
          activeCityId = Number(button.dataset.cityId);
          renderCityCards();
          renderCityDetail(activeCityId);
        });
      });
    }

    function renderCityDetail(cityId) {
      if (!appState) return;
      const city = appState.cities.find(item => item.id === cityId) || activeCity();
      const itemProgress = progress(city);
      const status = cityStatus(city);
      const logsMarkup = (logs.length ? logs : [{ time: "--:--", text: "歡迎來到台灣旅行冒險。" }])
        .map(log => `<div class="log"><strong>${escapeHtml(log.time)}</strong> ${escapeHtml(log.text)}</div>`)
        .join("");

      if (!city.unlocked) {
        document.getElementById("city-detail").innerHTML = `
          <div class="detail-card">
            <div class="detail-hero">
              <h2>🔒 ${escapeHtml(city.name)}</h2>
              <p>${escapeHtml(status.note)}</p>
            </div>
            <div class="status-pill locked">狀態：尚未解鎖</div>
            <div class="log-list">${logsMarkup}</div>
          </div>
        `;
        return;
      }

      document.getElementById("city-detail").innerHTML = `
        <div class="detail-card">
          <div class="detail-hero">
            <h2>${escapeHtml(city.badgeIcon || "🎒")} ${escapeHtml(city.name)}</h2>
            <p class="story-text">${escapeHtml(city.story || city.intro || "")}</p>
          </div>
          <div class="section-head">
            <h2>景點列表</h2>
            <span class="status-pill ${status.key}">${status.text}</span>
          </div>
          <p class="city-copy">城市進度：${itemProgress.done} / ${itemProgress.total}，完成率 ${itemProgress.percent}%</p>
          <div class="progress" style="margin:10px 0 14px"><span style="--w:${itemProgress.percent}%"></span></div>
          <div class="scene-list">
            ${city.scenes.map(scene => `
              <article class="scene-card ${scene.checked ? "done" : ""}">
                <div class="scene-image" ${scene.imageUrl ? `style="background-image: linear-gradient(180deg, rgba(255,255,255,.08), rgba(11,35,71,.18)), url('${escapeHtml(scene.imageUrl)}')"` : ""}></div>
                <div>
                  <h3>${scene.checked ? "✓ " : ""}${escapeHtml(scene.name)}</h3>
                  <p class="story-text">${escapeHtml(scene.story || scene.desc)}</p>
                  <div class="reward-row"><span>EXP +${scene.expReward}</span><span>金幣 +${scene.coinReward}</span></div>
                  ${scene.checked ? `
                    <button class="btn full" type="button" disabled>已打卡</button>
                  ` : `
                    <div class="quiz-box">
                      <strong>${escapeHtml(scene.quizQuestion || "回答景點問題後完成打卡")}</strong>
                      <div class="quiz-options">
                        ${renderOptionButtons(scene.quizOptions, "data-scene-id", scene.id)}
                      </div>
                    </div>
                  `}
                </div>
              </article>
            `).join("")}
          </div>
          ${renderBossChallenge(city, itemProgress)}
          <div class="log-list">${logsMarkup}</div>
        </div>
      `;

      document.querySelectorAll("[data-scene-id]").forEach(button => {
        button.addEventListener("click", () => checkin(Number(button.dataset.sceneId), button.dataset.answer, button.dataset.answerText));
      });

      document.querySelectorAll("[data-boss-city-id]").forEach(button => {
        button.addEventListener("click", () => challengeBoss(button.dataset.answer, button.dataset.answerText));
      });
    }

    function renderBossChallenge(city, itemProgress) {
      if (city.defeated) {
        return `
          <div class="detail-actions">
            <button class="btn red full" type="button" disabled>首領已擊敗，徽章已取得</button>
          </div>
        `;
      }
      if (itemProgress.done < itemProgress.total) {
        return `
          <div class="detail-actions">
            <button class="btn red full" type="button" disabled>還差 ${itemProgress.total - itemProgress.done} 個景點</button>
          </div>
        `;
      }
      return `
        <div class="detail-actions quiz-box">
          <strong>${escapeHtml(city.bossName)}：${escapeHtml(city.bossQuestion || "回答首領問題")}</strong>
          <div class="quiz-options">
            ${renderOptionButtons(city.bossOptions, "data-boss-city-id", city.id)}
          </div>
        </div>
      `;
    }

    function renderAll() {
      if (!appState) return;
      renderPlayerSummary();
      renderJourneyProgress();
      renderCityCards();
      renderCityDetail(activeCityId);
    }

    async function checkin(sceneId, answer, answerText) {
      try {
        const result = await api("/api/checkins", {
          method: "POST",
          body: JSON.stringify({ sceneId, answer, answerText })
        });
        if (!result.ok) {
          addLog("答錯了，再想想看。");
          return;
        }
        addLog("答對了，景點打卡完成。");
        await refreshState();
      } catch (error) {
        addLog(error.message);
      }
    }

    async function challengeBoss(answer, answerText) {
      const city = activeCity();
      try {
        const result = await api(`/api/cities/${city.id}/boss/challenge`, {
          method: "POST",
          body: JSON.stringify({ answer, answerText })
        });
        addLog(result.win ? `成功擊敗 ${city.bossName}。` : `${city.bossName} 太強了，請提升實力後再挑戰。`);
        await refreshState();
      } catch (error) {
        addLog(error.message);
      }
    }

    document.getElementById("loginForm").addEventListener("submit", async event => {
      event.preventDefault();
      const username = document.getElementById("nameInput").value.trim() || "旅行者";
      const password = document.getElementById("passwordInput").value;
      document.getElementById("loginError").textContent = "";
      try {
        await login(username, password);
      } catch (error) {
        document.getElementById("loginError").textContent = error.message;
      }
    });

    document.getElementById("registerBtn").addEventListener("click", async () => {
      const username = document.getElementById("nameInput").value.trim();
      const password = document.getElementById("passwordInput").value;
      const errorElement = document.getElementById("loginError");
      const validationMessage = validateAuthInput(username, password);
      errorElement.textContent = validationMessage;
      if (validationMessage) return;
      try {
        await register(username, password);
      } catch (error) {
        errorElement.textContent = error.message;
      }
    });

    document.getElementById("logoutBtn").addEventListener("click", () => {
      saveSession(null);
      appState = null;
      activeCityId = null;
      logs = [];
      document.getElementById("login").classList.remove("hidden");
    });

    if (session?.token) {
      document.getElementById("login").classList.add("hidden");
      refreshState().catch(() => {
        saveSession(null);
        document.getElementById("login").classList.remove("hidden");
      });
    }
  </script>
</body>
</html>
